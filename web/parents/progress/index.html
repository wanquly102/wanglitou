<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wanglitou | 学习进度中心</title>
    <meta
      name="description"
      content="查看孩子的学习报告、练习历史和错题本，帮助家长安排下一轮英语、数学和语文训练。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/portal.js"></script>
  </head>
  <body>
    <div class="orb orb-two"></div>
    <div class="orb orb-three"></div>

    <div class="shell">
      <header class="site-header glass">
        <a class="brand" href="/">wanglitou</a>
        <nav class="nav-links">
          <a href="/portal.html">家长控制台</a>
          <a href="#report">学习报告</a>
          <a href="#history">练习历史</a>
          <a href="#wrong-book">错题本</a>
        </nav>
      </header>

      <main>
        <section class="section hero-grid compact-hero">
          <div class="glass panel-xl">
            <p class="eyebrow">Learning Progress</p>
            <h1>报告、历史和错题本拆到一个独立页面里，复盘更顺手。</h1>
            <p class="lead">
              这个页面专门给家长看训练结果。控制台负责管理，练习页负责训练，进度页负责复盘和安排下一步。
            </p>
            <div class="status-banner" id="global-message">正在加载学习进度...</div>
          </div>

          <aside class="glass panel-lg">
            <p class="eyebrow">Quick Actions</p>
            <div class="stack-list" id="quota-card"></div>
            <div class="button-row">
              <a class="button primary" href="/practice/english/">英语练习</a>
              <a class="button secondary" href="/practice/math/">数学练习</a>
              <a class="button secondary" href="/practice/chinese/">语文练习</a>
            </div>
          </aside>
        </section>

        <section class="section" id="report">
          <div class="section-head">
            <p class="eyebrow">Parent Report</p>
            <h2>家长报告</h2>
          </div>
          <div class="grid-3" id="report-metrics"></div>
          <div class="grid-2">
            <article class="glass card">
              <div class="section-head narrow">
                <p class="eyebrow">By Module</p>
                <h2>模块表现</h2>
              </div>
              <div class="list-block" id="report-by-module"></div>
            </article>
            <article class="glass card">
              <div class="section-head narrow">
                <p class="eyebrow">By Child</p>
                <h2>孩子表现</h2>
              </div>
              <div class="list-block" id="report-by-child"></div>
            </article>
          </div>
          <article class="glass card">
            <div class="section-head narrow">
              <p class="eyebrow">Recommendation</p>
              <h2>本周建议</h2>
            </div>
            <div class="status-banner" id="report-suggestion"></div>
          </article>
        </section>

        <section class="section" id="history">
          <div class="section-head">
            <p class="eyebrow">Practice History</p>
            <h2>练习历史</h2>
          </div>
          <div class="glass card">
            <div class="list-block" id="history-list"></div>
          </div>
        </section>

        <section class="section" id="wrong-book">
          <div class="section-head">
            <p class="eyebrow">Wrong Answer Book</p>
            <h2>错题本</h2>
          </div>
          <div class="glass card">
            <div class="list-block" id="wrong-book-list"></div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
